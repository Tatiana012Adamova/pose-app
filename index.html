<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Photo Assistant Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        .app-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #ai-hints {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px;
            z-index: 100; text-align: center; border: 2px solid #00f2ff; min-width: 250px;
        }

        /* Трафарет */
        #stencil {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; opacity: 0.6; z-index: 50; pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
        }

        .bottom-ui {
            position: absolute; bottom: 40px; width: 100%; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .shutter {
            width: 70px; height: 70px; background: #fff; border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3);
        }

        /* Инструкция после фото */
        #save-instruction {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        #result-image { width: 80%; border: 2px solid white; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="ai-hints">Инициализация ИИ...</div>
    <video id="input_video" playsinline></video>
    
    <!-- Трафарет (Вшитый SVG, чтобы точно отобразился) -->
    <img id="stencil" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMjAgNTEyIj48cGF0aCBmaWxsPSJ3aGl0ZSIgZD0iTTIwOCIDQ4YzAgMjYuNS0yMS41IDQ4LTQ4IDQ4cy00OC0yMS41LTQ4LTQ4IDIxLjUtNDggNDgtNDggNDggMjEuNSA0OCA0OHptLTQ4IDY0YzI4LjcgMCA1MS4yLTIzIDUxLjItNTEuMi0zNi40IDctNTAuNSAyNy45LTY5LjggNDUuNi0yMSAxOS4zLTQ5LjYgNDkuMy0xMDkuMiA0OS4zdS04OC4yLTMwLTg4LjItMzBjLTM2LjQgMC02NiAzMC02NiA2NnYyMDBjMCAzNi40IDMwIDY2IDY2IDY2aDIwMGMzNi40IDAgNjYtMzAgNjYtNjZWMjU0YzAtMzYuNC0zMC02Ni02Ni02NnoiLz48L3N2Zz4=">

    <div class="bottom-ui">
        <button class="shutter" onclick="takePhoto()"></button>
        <p style="font-size: 12px;">Нажмите, чтобы сделать фото</p>
    </div>
</div>

<!-- Окно сохранения -->
<div id="save-instruction">
    <h3>Готово!</h3>
    <img id="result-image">
    <p>Зажмите пальцем фото выше<br>и выберите <b>«Сохранить»</b></p>
    <button onclick="closePreview()" style="background:none; border:1px solid white; color:white; padding:10px;">Вернуться к камере</button>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const hintElement = document.getElementById('ai-hints');
    const stencil = document.getElementById('stencil');
    const saveScreen = document.getElementById('save-instruction');
    const resultImg = document.getElementById('result-image');

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        if (!results.poseLandmarks) {
            updateHint("👤 Встаньте в кадр", "#fff");
            return;
        }
        const lm = results.poseLandmarks;
        const angle = Math.abs(lm[11].y - lm[12].y);
        const dist = Math.abs(lm[11].x - lm[12].x);

        if (angle > 0.04) {
            updateHint("📐 Выровняйте горизонт!", "#ffbb00");
        } else if (dist > 0.6) {
            updateHint("🚶 Отойдите чуть дальше", "#00f2ff");
        } else {
            updateHint("✅ Идеально! Снимайте", "#00ff88");
        }
    });

    function updateHint(text, color) {
        hintElement.innerText = text;
        hintElement.style.borderColor = color;
        hintElement.style.color = color;
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    function takePhoto() {
        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0);
        
        // Показываем превью для сохранения
        resultImg.src = canvas.toDataURL('image/png');
        saveScreen.style.display = 'flex';
    }

    function closePreview() {
        saveScreen.style.display = 'none';
    }
</script>
</body>
</html>
