<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Pose App</title>
    <!-- Загружаем "мозги" ИИ от Google -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 85vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        /* Трафарет делаем чуть прозрачным, чтобы было удобно */
        #output_canvas { z-index: 10; opacity: 0.7; } 
        .controls { height: 15vh; display: flex; align-items: center; justify-content: center; background: #111; }
        button { 
            background: #ffffff; color: #000; border: none; padding: 15px 40px; 
            border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .status { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 20; font-size: 12px; color: #0f0; }
    </style>
</head>
<body>

    <div class="status" id="status">Загрузка ИИ-модели...</div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="controls">
        <button id="snap">СДЕЛАТЬ ФОТО</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusElement = document.getElementById('status');

        // Настройка ИИ Pose
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // Функция рисования трафарета
        pose.onResults((results) => {
            statusElement.innerText = "ИИ работает";
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Рисуем скелет (трафарет)
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
                               {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks,
                              {color: '#FF0000', lineWidth: 2, radius: 3});
            }
            canvasCtx.restore();
        });

        // Запуск камеры
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        // Логика сохранения фото (без трафарета)
        document.getElementById('snap').onclick = () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = videoElement.videoWidth;
            tempCanvas.height = videoElement.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Рисуем только видео (без трафарета!)
            tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
            
            // Скачиваем файл
            const link = document.createElement('a');
            link.download = `photo_${Date.now()}.png`;
            link.href = tempCanvas.toDataURL();
            link.click();
        };

        // Подгоняем размер холста под экран
        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight * 0.85;
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
