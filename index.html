<!DOCTYPE html>
<html>
<head>
    <title>Pose App</title>
    <style>
        /* Это настройки внешнего вида: камера на весь экран */
        body { margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; background: black; }
        video { width: 100vw; height: 80vh; object-fit: cover; }
        #overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 80vh; pointer-events: none; }
        button { padding: 15px 30px; margin-top: 20px; font-size: 18px; border-radius: 10px; border: none; background: #0088cc; color: white; }
    </style>
</head>
<body>
    <!-- Видео с камеры -->
    <video id="webcam" autoplay playsinline></video>
    <!-- Слой для трафарета (пока просто рамка для примера) -->
    <canvas id="overlay"></canvas>
    <button onclick="takePhoto()">Сделать фото</button>

    <script>
        // Код для включения камеры
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; });

        function takePhoto() {
            alert("Фото сохранено! (Здесь будет логика сохранения)");
        }
    </script>
</body>
</html>
