<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Эта строка ниже — страховка для кодировки -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мое Фото-Приложение</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background-color: #111; 
            color: white; 
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        #webcam {
            width: 100%;
            height: 70vh;
            object-fit: cover;
            border-bottom: 2px solid #0088cc;
        }
        .controls {
            padding: 20px;
            text-align: center;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    
    <div class="controls">
        <p>Камера готова к работе</p>
        <button id="capture">СДЕЛАТЬ ФОТО</button>
    </div>

    <script>
        const video = document.getElementById('webcam');

        // Запрашиваем доступ к камере
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // "user" для селфи, "environment" для задней
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Ошибка доступа к камере: " + err.name);
            }
        }

        setupCamera();

        document.getElementById('capture').onclick = () => {
            alert("Кнопка нажата! На следующем этапе мы добавим сюда ИИ и сохранение.");
        };
    </script>
</body>
</html>
