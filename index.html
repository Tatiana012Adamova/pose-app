<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Photo Pro Assistant</title>
    <!-- Подключаем мощные библиотеки ИИ -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        .app-container { position: relative; width: 100vw; height: 100vh; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Слой подсказок ИИ */
        #ai-hints {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
            z-index: 100; text-align: center; border: 1px solid #00f2ff;
            min-width: 200px; transition: all 0.3s;
        }

        /* Трафарет */
        #stencil {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: 75%; z-index: 50; opacity: 0.5;
            pointer-events: none; transition: filter 0.3s;
        }

        .bottom-ui {
            position: absolute; bottom: 30px; width: 100%; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .shutter {
            width: 80px; height: 80px; background: white; border-radius: 50%;
            border: 10px solid rgba(255,255,255,0.2); outline: none;
        }

        .pose-shelf {
            display: flex; gap: 10px; overflow-x: auto; width: 90%; padding: 10px;
            scrollbar-width: none;
        }
        .pose-card {
            min-width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .pose-card img { width: 40px; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="ai-hints">Анализ кадра...</div>
    <video id="input_video" playsinline></video>
    <img id="stencil" src="https://www.svgrepo.com/show/415332/model-fashion-female.svg">

    <div class="bottom-ui">
        <div class="pose-shelf" id="shelf">
            <!-- Здесь будет много поз -->
        </div>
        <button class="shutter" onclick="takePhoto()"></button>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const hintElement = document.getElementById('ai-hints');
    const stencil = document.getElementById('stencil');

    // Настройка MediaPipe Pose
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        if (!results.poseLandmarks) {
            updateHint("Человек не найден", "#ff4444");
            return;
        }

        const landmarks = results.poseLandmarks;
        
        // 1. Проверка наклона (горизонт)
        const leftShoulder = landmarks[11];
        const rightShoulder = landmarks[12];
        const angle = Math.abs(leftShoulder.y - rightShoulder.y);
        
        // 2. Проверка дальности (по расстоянию между плечами)
        const dist = Math.sqrt(Math.pow(leftShoulder.x - rightShoulder.x, 2));

        // Логика советов
        if (angle > 0.05) {
            updateHint("Держите камеру ровнее", "#ffbb00");
            stencil.style.filter = "invert(1) sepia(1) saturate(5) hue-rotate(-50deg)";
        } else if (dist > 0.5) {
            updateHint("Слишком близко! Отойдите", "#ffbb00");
        } else if (dist < 0.2) {
            updateHint("Слишком далеко! Подойдите", "#ffbb00");
        } else {
            updateHint("Идеальная позиция!", "#00ff88");
            stencil.style.filter = "invert(1) brightness(2)";
        }
    });

    function updateHint(text, color) {
        hintElement.innerText = text;
        hintElement.style.borderColor = color;
        hintElement.style.color = color;
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    // Библиотека поз
    const poseImages = [
        'https://www.svgrepo.com/show/415332/model-fashion-female.svg',
        'https://www.svgrepo.com/show/24419/sitting-man.svg',
        'https://www.svgrepo.com/show/343015/person-shooting-selfie.svg',
        'https://www.svgrepo.com/show/154740/yoga.svg',
        'https://www.svgrepo.com/show/13591/fashion-model.svg'
    ];

    const shelf = document.getElementById('shelf');
    poseImages.forEach(url => {
        const div = document.createElement('div');
        div.className = 'pose-card';
        div.innerHTML = `<img src="${url}" onclick="setPose('${url}')">`;
        shelf.appendChild(div);
    });

    function setPose(url) {
        stencil.src = url;
    }

    function takePhoto() {
        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0);
        const link = document.createElement('a');
        link.download = `pro_photo.png`;
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
