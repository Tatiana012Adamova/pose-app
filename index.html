<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Smart Silhouette</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* Слой с подсказками */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        
        #hint-box {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px;
            border: 2px solid #00f2ff; text-align: center; min-width: 250px;
        }

        .controls { 
            position: absolute; bottom: 50px; width: 100%; 
            display: flex; justify-content: center; pointer-events: auto;
        }

        .shutter-btn {
            width: 80px; height: 80px; background: white; border-radius: 50%;
            border: 10px solid rgba(255,255,255,0.2); cursor: pointer; pointer-events: all;
        }

        /* Превью готового фото */
        #preview-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,1); z-index: 200; flex-direction: column; align-items: center; justify-content: center;
        }
        #res-img { max-width: 85%; border: 3px solid #00f2ff; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <video id="v" playsinline></video>
    <canvas id="c"></canvas>
    
    <div id="ui-layer">
        <div id="hint-box">Загрузка ИИ...</div>
        <div class="controls">
            <button class="shutter-btn" id="snap"></button>
        </div>
    </div>
</div>

<div id="preview-overlay">
    <h2>Фото готово!</h2>
    <img id="res-img">
    <p>Зажмите фото, чтобы сохранить</p>
    <button onclick="closePrev()" style="padding: 10px 20px; background: #00f2ff; border:none; border-radius:10px;">Вернуться</button>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint-box');
    const snapBtn = document.getElementById('snap');

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!results.poseLandmarks) {
            hint.innerHTML = "👤 Встаньте в кадр";
            hint.style.color = "white";
            return;
        }

        // РИСУЕМ СИЛУЭТ (Генерация ИИ)
        const lm = results.poseLandmarks;
        
        // Рисуем мягкое свечение вокруг тела
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00f2ff";
        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;
        ctx.beginPath();
        
        // Голова и плечи (создаем контур)
        ctx.moveTo(lm[12].x * canvas.width, lm[12].y * canvas.height);
        ctx.lineTo(lm[11].x * canvas.width, lm[11].y * canvas.height);
        ctx.stroke();

        // Проверка параметров
        const dist = Math.abs(lm[11].x - lm[12].x);
        const tilt = Math.abs(lm[11].y - lm[12].y);

        if (tilt > 0.05) {
            hint.innerHTML = "📐 Выровняйте горизонт";
            hint.style.color = "#ff4444";
        } else if (dist > 0.5) {
            hint.innerHTML = "🚶 Слишком близко";
            hint.style.color = "#ffbb00";
        } else {
            hint.innerHTML = "✅ ПОЗА ИДЕАЛЬНА!";
            hint.style.color = "#00ff88";
        }
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await pose.send({image: video});
        },
        width: 1280, height: 720
    });
    camera.start();

    snapBtn.onclick = () => {
        const outCanvas = document.createElement('canvas');
        outCanvas.width = video.videoWidth;
        outCanvas.height = video.videoHeight;
        outCanvas.getContext('2d').drawImage(video, 0, 0);
        
        document.getElementById('res-img').src = outCanvas.toDataURL('image/png');
        document.getElementById('preview-overlay').style.display = 'flex';
    };

    function closePrev() {
        document.getElementById('preview-overlay').style.display = 'none';
    }
</script>
</body>
</html>
