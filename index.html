<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Pose Director</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #ui-layer { position: absolute; top: 30px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #hint { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 20px; border: 2px solid #00f2ff; display: inline-block; min-width: 260px; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .snap-btn { width: 70px; height: 70px; background: white; border-radius: 50%; border: 6px solid #00f2ff; }
        #save-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #res-photo { max-width: 85%; border: 2px solid #00f2ff; }
    </style>
</head>
<body>

<div class="container">
    <video id="v" playsinline></video>
    <canvas id="c"></canvas>
    <div id="ui-layer"><div id="hint">ИИ изучает окружение...</div></div>
    <div class="controls"><button class="snap-btn" onclick="capture()"></button></div>
</div>

<div id="save-screen">
    <img id="res-photo">
    <p>Зажмите фото для сохранения</p>
    <button onclick="location.reload()" style="padding:10px 20px; margin-top:15px; background:#00f2ff; border:none; border-radius:10px;">ВЕРНУТЬСЯ</button>
</div>

<script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });

    // Эталонные смещения для "красивых поз"
    const suggestions = {
        standing: { label: "Разведите руки чуть шире для динамики", offset: 0.15 },
        sitting: { label: "Сядьте вполоборота, вытяните одну ногу", offset: -0.2 }
    };

    pose.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!results.poseLandmarks) {
            hint.innerText = "👤 Встаньте в кадр полностью";
            return;
        }

        const lm = results.poseLandmarks;
        const w = canvas.width;
        const h = canvas.height;

        // ОПРЕДЕЛЯЕМ КОНТЕКСТ (Сидит или Стоит)
        // Если бедро и колено на близкой высоте — человек сидит
        const isSitting = Math.abs(lm[23].y - lm[25].y) < 0.15;
        const currentMode = isSitting ? suggestions.sitting : suggestions.standing;

        // ГЕНЕРИРУЕМ ПРЕДЛОЖЕНИЕ (Рисуем "правильный" силуэт)
        // Мы берем реальные точки пользователя, но ГЕНЕРИРУЕМ их смещение
        ctx.beginPath();
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(0, 242, 255, 0.6)";
        ctx.setLineDash([10, 10]); // Пунктирная линия предложения

        // Рисуем голову предложения
        ctx.arc(lm[0].x * w, (lm[0].y * h) - 10, 35, 0, Math.PI * 2);
        
        // Рисуем "предлагаемые" плечи (шире или под углом)
        const off = currentMode.offset;
        ctx.moveTo((lm[12].x + off) * w, lm[12].y * h);
        ctx.lineTo((lm[11].x - off) * w, lm[11].y * h);
        
        ctx.stroke();
        ctx.setLineDash([]); // Возвращаем сплошную линию

        // АНАЛИЗ ТОЧНОСТИ СОВПАДЕНИЯ
        const currentWidth = Math.abs(lm[11].x - lm[12].x);
        if (isSitting) {
            hint.innerHTML = `🧘 <b>Предложение:</b> ${currentMode.label}`;
            hint.style.borderColor = "#ffbb00";
        } else {
            hint.innerHTML = `💃 <b>Предложение:</b> ${currentMode.label}`;
            hint.style.borderColor = "#00f2ff";
        }

        // Если пользователь "попал" в предложение (например, развел руки)
        if (currentWidth > 0.4 && !isSitting) {
            hint.innerHTML = "✅ ОТЛИЧНО! ТАК ГРАЦИОЗНЕЕ!";
            hint.style.borderColor = "#00ff88";
            ctx.strokeStyle = "#00ff88";
            ctx.setLineDash([]);
            ctx.stroke();
        }
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await pose.send({image: video});
        },
        width: 1280, height: 720
    });
    camera.start();

    function capture() {
        const temp = document.createElement('canvas');
        temp.width = video.videoWidth; temp.height = video.videoHeight;
        temp.getContext('2d').drawImage(video, 0, 0);
        document.getElementById('res-photo').src = temp.toDataURL();
        document.getElementById('save-screen').style.display = 'flex';
    }
</script>
</body>
</html>
